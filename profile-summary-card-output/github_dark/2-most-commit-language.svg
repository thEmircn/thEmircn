<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200"><style>
@keyframes gpsc-fade{from{opacity:0}to{opacity:1}}
@keyframes gpsc-rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes gpsc-grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes gpsc-pop{from{opacity:0;transform:scale(.55)}to{opacity:1;transform:scale(1)}}
@keyframes gpsc-wipe{from{transform:translateX(calc(-1 * var(--gpsc-w,420px)))}to{transform:translateX(0)}}
@keyframes gpsc-tint{from{filter:sepia(.7) saturate(4) hue-rotate(-70deg)}to{filter:sepia(0) saturate(1) hue-rotate(0)}}
@keyframes gpsc-rgb{0%{filter:hue-rotate(0deg) saturate(1)}50%{filter:hue-rotate(180deg) saturate(1.7)}100%{filter:hue-rotate(360deg) saturate(1)}}.gpsc-item{animation:gpsc-fade 0.8s ease both calc(var(--gpsc-i,0) * 0.12s)}.arc{animation:gpsc-pop 0.8s ease both 0.9s;transform-box:fill-box;transform-origin:center}rect.bar{animation:gpsc-grow 1s cubic-bezier(.2,.7,.3,1) both 0.9s;transform-box:fill-box;transform-origin:center bottom}.gpsc-reveal{animation:gpsc-wipe 1.2s linear both 0.8s}@media (prefers-reduced-motion:reduce){.gpsc-root,.gpsc-root *,.gpsc-item,.gpsc-chart,rect.bar,.arc,.gpsc-reveal{animation:none!important}}</style><style>* {
          font-family: 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif
        }</style><g class="gpsc-root"><rect x="1" y="1" rx="5" ry="5" height="99%" width="99.41176470588235%" stroke="#2e343b" stroke-width="1" fill="#0d1117" stroke-opacity="1"></rect><text x="30" y="40" class="gpsc-item" style="--gpsc-i: 0; font-size: 22px; fill: #0366d6;">Top Languages by Commit</text><g transform="translate(0,40)"><g transform="translate(40,0)"><rect y="18" width="14" height="14" class="gpsc-item" style="--gpsc-i: 0; stroke-width: 1px;" fill="#f1e05a" stroke="#0d1117"></rect><rect y="43.2" width="14" height="14" class="gpsc-item" style="--gpsc-i: 1; stroke-width: 1px;" fill="#178600" stroke="#0d1117"></rect><rect y="68.4" width="14" height="14" class="gpsc-item" style="--gpsc-i: 2; stroke-width: 1px;" fill="#4F5D95" stroke="#0d1117"></rect><text x="16.8" y="30" class="gpsc-item" style="--gpsc-i: 0; fill: #77909c; font-size: 14px;">JavaScript</text><text x="16.8" y="55.2" class="gpsc-item" style="--gpsc-i: 1; fill: #77909c; font-size: 14px;">C#</text><text x="16.8" y="80.4" class="gpsc-item" style="--gpsc-i: 2; fill: #77909c; font-size: 14px;">PHP</text></g><g transform="translate( 230, 80 )"><g class="arc" style="--gpsc-i: 0;"><path d="M3.67394039744206e-15,-60A60,60,0,0,1,13.351256037378867,58.495674730909414L7.788232688471005,34.122476926363824A35,35,0,0,0,2.1431318985078682e-15,-35Z" style="fill: #f1e05a; stroke-width: 2px;" stroke="#0d1117"></path></g><g class="arc" style="--gpsc-i: 1;"><path d="M13.351256037378867,58.495674730909414A60,60,0,0,1,-54.05813207414515,-26.03302434705348L-31.53391037658467,-15.18593086911453A35,35,0,0,0,7.788232688471005,34.122476926363824Z" style="fill: #178600; stroke-width: 2px;" stroke="#0d1117"></path></g><g class="arc" style="--gpsc-i: 2;"><path d="M-54.05813207414515,-26.03302434705348A60,60,0,0,1,-1.1021821192326178e-14,-60L-6.429395695523604e-15,-35A35,35,0,0,0,-31.53391037658467,-15.18593086911453Z" style="fill: #4F5D95; stroke-width: 2px;" stroke="#0d1117"></path></g></g></g></g></svg>