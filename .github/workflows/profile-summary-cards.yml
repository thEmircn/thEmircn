name: GitHub Dashboard Kartlarını Üret

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - profile-readme-game-mode
    paths:
      - README.md
      - .github/workflows/profile-summary-cards.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository